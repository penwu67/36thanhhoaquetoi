<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px 20px;
        }
        nav {
            display: flex;
            justify-content: center;
        }
        nav a {
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }

        .STPID {
            position: relative;
            display: inline-block;
        }

        .stpid a:hover{
            background-color: black;
        }
        
        .stpid {
            display: none;
            position: absolute;
            background-color: #444;
            min-width: 150px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .STPID:hover .stpid{
            display: block;
        }

        main {
            flex: 1;
            padding: 20px;
            background-image: url("video/gay.png");
            background-size: 50%;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1> BẢO ĐẸP TRAI </h1>
        <nav>
            <div class="STPID">
                <a href="index.html">Trang Chủ</a>
                <div class="stpid">
                    <a href="page1.html">Trang Con 1</a>
                    <a href="page2.html">Trang Con 2</a>
                    <a href="page3.html">Trang Con 3</a>  
                </div>    
            </div>
        </nav>
    </header>

    <main>
        <h1> BẢY GAO </h1>
    </main>

    <footer>
        <p>TÔI LÀ BẢO</p>
    </footer>

</body>
</html>
